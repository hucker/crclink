# Run the suite across the supported Python versions, uv-backed (no pip, no
# virtualenv). tox-uv provides the runner; uvx supplies tox + tox-uv:
#
#   uvx --with tox-uv tox run            # every env
#   uvx --with tox-uv tox run -e py312   # one version
#   uvx --with tox-uv tox run -e lint    # ruff + ty only
#
# Each env syncs from uv.lock with the dev dependency group, so the tools and
# the pinned crcglot generator match a normal `uv sync`.
[tox]
requires =
    tox>=4.22
    tox-uv>=1.16
env_list =
    py311
    py312
    py313
    py314
    lint

[testenv]
description = run the test suite under {base_python}
runner = uv-venv-lock-runner
dependency_groups = dev
commands = pytest -q

[testenv:lint]
description = ruff + ty (Python-version independent; run once)
runner = uv-venv-lock-runner
dependency_groups = dev
commands =
    ruff check src tests
    ty check src
