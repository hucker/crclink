name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync dependencies
        run: uv sync
      - name: Quality (ruff + ty + pytest)
        run: uv run python scripts/quality.py

  c:
    name: C tests (Unity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and run the Unity suite
        run: make -C src/c/test test
